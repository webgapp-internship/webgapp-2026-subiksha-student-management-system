<html>

<head>

<title>Media Query Example</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    padding:0;
    background-color:#f2f2f2;
}

.container{
    width:100%;
    margin:auto;
    background-color:tomato;
    padding:20px;
    box-sizing:border-box;
}

h1{
    font-size:50px;
    color:white;
}

p{
    font-size:25px;
    color:white;
}


/* Extra Small Devices */

@media (max-width:575px){

    .container{
        width:100%;
        padding:10px;
    }

    h1{
        font-size:28px;
        text-align:center;
    }

    p{
        font-size:18px;
        text-align:center;
    }

}


/* Small Devices */

@media (min-width:576px){

    .container{
        width:540px;
    }

}


/* Tablets */

@media (min-width:768px){

    .container{
        width:720px;
    }

}


/* Laptops */

@media (min-width:992px){

    .container{
        width:960px;
    }

}


/* Desktops */

@media (min-width:1200px){

    .container{
        width:1140px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>My Responsive Website</h1>

<p>This webpage is using media query</p>

</div>

</body>

</html>
