<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .box{
            width: 300px;
            background: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Student Form</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

</body>
</html>
