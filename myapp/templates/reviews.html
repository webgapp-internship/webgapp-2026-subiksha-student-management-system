<!DOCTYPE html>
<html>
<head>

    <title>Reviews</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-image:url('https://images.unsplash.com/photo-1516280440614-37939bbacd81');
            background-size:cover;
            color:white;
        }

        .overlay{
            background:rgba(0,0,0,0.8);
            min-height:100vh;
            padding:50px;
        }

        .review-box{
            background:rgba(255,255,255,0.1);
            padding:30px;
            border-radius:20px;
            margin-bottom:30px;
        }

        .rating{
            color:gold;
            font-size:25px;
        }

    </style>

</head>

<body>

<div class="overlay">

<div class="container">

    <h1 class="text-center display-3 mb-5">
        Movie Reviews
    </h1>

    <div class="review-box">

        <h2>Leo</h2>

        <p>
            Stylish visuals and strong action sequences.
        </p>

        <div class="rating">
            ★★★★☆
        </div>

    </div>

    <div class="review-box">

        <h2>coolie</h2>

        <p>
            Excellent background music and mass scenes.
        </p>

        <div class="rating">
            ★★★★★
        </div>

    </div>

    <div class="review-box">

        <h2>GOAT</h2>

        <p>
            Emotional storytelling and realistic acting.
        </p>

        <div class="rating">
            ★★★★☆
        </div>

    </div>

    <div class="text-center">

        <a href="/" class="btn btn-warning btn-lg">
            Back Home
        </a>

    </div>

</div>

</div>

</body>
</html>
