<body style="background-color:#e8f0fe;">

<h2 style="text-align:center; margin-top:20px;">Student Records</h2>

<div style="display:flex; justify-content:center; margin-top:30px;">

    <table border="1" style="border-collapse:collapse; background-color:white; width:600px; text-align:center;">
        <tr style="background-color:#4a90e2; color:white;">
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
            <th>Action</th>
        </tr>

        {% for i in students %}
        <tr>
            <td>{{ i.name }}</td>
            <td>{{ i.email }}</td>
            <td>{{ i.password }}</td>
            <td>
                <a href="/update/{{ i.id }}/">Edit</a>
                <a href="/delete/{{ i.id }}/">delete</a>

            </td>
        </tr>
        {% endfor %}
    </table>

</div>

<br>

<div style="text-align:center;">
    <a href="/add/" style="text-decoration:none; padding:10px 15px; background-color:green; color:white; border-radius:5px;">
        Add Student
    </a>
</div>

</body>
