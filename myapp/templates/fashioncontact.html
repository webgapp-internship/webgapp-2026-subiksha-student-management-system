<!DOCTYPE html>
<html>

<head>

    <title>Contact - Fashion Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family: Arial;
            background:#f8f8f8;
        }

        .navbar{
            background:white;
        }

        .brand{
            font-size:28px;
            font-weight:bold;
        }

        .contact-box{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        .btn-dark{
            width:100%;
        }

        .info-box{
            background:black;
            color:white;
            padding:30px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar p-3 shadow-sm">
    <div class="container">

        <a href="/" class="brand text-decoration-none text-dark">
            MODERN CLOTHS CONTACT
        </a>

        <div>
            <a href="/" class="text-dark me-3">Home</a>
            <a href="/shop/" class="text-dark">Shop</a>
        </div>

    </div>
</nav>


<!-- CONTACT SECTION -->

<div class="container mt-5">

    <div class="row g-4">

        <!-- CONTACT FORM -->

        <div class="col-md-6">

            <div class="contact-box">

                <h3 class="mb-3">Get in Touch</h3>

                <form>

                    <input type="text" class="form-control mb-3" placeholder="Your Name">

                    <input type="email" class="form-control mb-3" placeholder="Your Email">

                    <input type="text" class="form-control mb-3" placeholder="Subject">

                    <textarea rows="5" class="form-control mb-3" placeholder="Message"></textarea>

                    <button class="btn btn-dark">Send Message</button>

                </form>

            </div>

        </div>


        <!-- CONTACT INFO -->

        <div class="col-md-6">

            <div class="info-box">

                <h4>Contact Info</h4>

                <hr>

                <p>📍 Madurai, Tamil Nadu</p>
                <p>📞 +91 9876543210</p>
                <p>📧 moderncloths@gmail.com</p>

                <hr>

                <p>🕒 Mon - Sat : 9 AM - 9 PM</p>

            </div>

        </div>

    </div>

</div>

</body>

</html>
