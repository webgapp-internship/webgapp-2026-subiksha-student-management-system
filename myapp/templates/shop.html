<!DOCTYPE html>
<html>

<head>

    <title>Shop - Fashion Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family: Arial;
            background:#f8f8f8;
        }

        .navbar{
            background:white;
        }

        .brand{
            font-size:28px;
            font-weight:bold;
        }

        .card{
            border:none;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            height:320px;
            object-fit:cover;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        .btn-shop{
            background:black;
            color:white;
            width:100%;
        }

        .btn-shop:hover{
            background:#444;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar p-3 shadow-sm">
    <div class="container">

        <a href="/" class="brand text-decoration-none text-dark">
            MODERN CLOTHS
        </a>

        <div>
            <a href="/" class="me-3 text-dark">Home</a>
            <a href="/fashioncontact/" class="text-dark">Contact</a>
        </div>

    </div>
</nav>


<!-- TITLE -->

<div class="container mt-4">

    <h2 class="text-center mb-4">Trending Dresses</h2>

    <div class="row g-4">

        <!-- PRODUCT 1 -->
        <div class="col-md-4">

            <div class="card">

                <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c" class="card-img-top">

                <div class="card-body text-center">

                    <h5>Floral Dress</h5>

                    <p class="price">₹1499</p>

                    <button class="btn btn-shop">Add to Cart</button>

                </div>

            </div>

        </div>


        <!-- PRODUCT 2 -->
        <div class="col-md-4">

            <div class="card">

                <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b" class="card-img-top">

                <div class="card-body text-center">

                    <h5>Casual Wear</h5>

                    <p class="price">₹1999</p>

                    <button class="btn btn-shop">Add to Cart</button>

                </div>

            </div>

        </div>


        <!-- PRODUCT 3 -->
        <div class="col-md-4">

            <div class="card">

                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" class="card-img-top">

                <div class="card-body text-center">

                    <h5>Party Dress</h5>

                    <p class="price">₹2499</p>

                    <button class="btn btn-shop">Add to Cart</button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
