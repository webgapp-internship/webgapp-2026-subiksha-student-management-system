<body style="background: linear-gradient(120deg, #74ebd5, #9face6); height:100vh; margin:0;">

<h2 style="text-align:center; color:white; padding-top:30px;">Update Form</h2>

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">

    <form method="POST"
          style="background:white; padding:30px; width:320px;
                 border-radius:10px; box-shadow:0px 0px 15px rgba(0,0,0,0.2);">

        {% csrf_token %}

        <label>Name</label><br>
        <input type="text" name="name" value="{{ student.name }}"
               style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Email</label><br>
        <input type="email" name="email" value="{{ student.email }}"
               style="width:100%; padding:8px; margin-bottom:10px;"><br>

        <label>Password</label><br>
        <input type="text" name="password" value="{{ student.password }}"
               style="width:100%; padding:8px; margin-bottom:15px;"><br>

        <button type="submit"
                style="width:100%; padding:10px; background:#4CAF50; color:white; border:none;">
            Update
        </button>

    </form>

</div>

</body>
