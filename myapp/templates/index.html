<!DOCTYPE html>
<html>
<head>

    <title>Tamil MovieVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');
            background-size:cover;
            background-position:center;
            color:white;
        }

        .overlay{
            background:rgba(0,0,0,0.75);
            min-height:100vh;
        }

        .hero{
            text-align:center;
            padding-top:180px;
        }

        .hero h1{
            font-size:80px;
            font-weight:bold;
            text-shadow:0px 0px 20px red;
        }

        .hero p{
            font-size:25px;
        }

    </style>

</head>

<body>

<div class="overlay">

<nav class="navbar navbar-dark bg-dark p-3">

<div class="container">

    <a class="navbar-brand fs-2" href="/">
        Tamil MovieVerse
    </a>

    <div>

        <a href="/" class="btn btn-outline-light">
            Home
        </a>

        <a href="/movies/" class="btn btn-outline-light">
            Movies
        </a>

        <a href="/reviews/" class="btn btn-outline-light">
            Reviews
        </a>

    </div>

</div>

</nav>

<div class="container hero">

    <h1>
        Tamil MovieVerse
    </h1>

    <p class="mt-4">
        Watch trending Tamil movie updates and reviews.
    </p>

    <a href="/movies/" class="btn btn-danger btn-lg mt-4">
        Explore Movies
    </a>

</div>

</div>

</body>
</html>
