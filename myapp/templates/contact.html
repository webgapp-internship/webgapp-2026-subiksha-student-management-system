{% load static %}
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
</head>

<body  
background="https://wallpapercave.com/wp/wp2856621.jpg"
style="background-size: cover; background-repeat: no-repeat;">

    <br><br>

<nav align="center">

    <a href="{% url 'home' %}">Home</a>

    <a href="{% url 'about' %}" style="margin-left:20px;">About</a>

    <a href="{% url 'tablepage' %}" style="margin-left:20px;">Table Page</a>

    <a href="{% url 'services' %}" style="margin-left:20px;">Services</a>

</nav>

    <br><br>

  

        <h1>Student Registration Form</h1>

        <form>

            <!-- 1 -->
            <label>Full Name :</label><br>
            <input type="text" placeholder="Enter full name">

            <br><br>

            <!-- 2 -->
            <label>Email Address :</label><br>
            <input type="email" placeholder="Enter email">

            <br><br>

            <!-- 3 -->
            <label>Create Password :</label><br>
            <input type="password" placeholder="Create password">

            <br><br>

            <!-- 4 -->
            <label>Mobile Number :</label><br>
            <input type="number" placeholder="Enter mobile number">

            <br><br>

            <!-- 5 -->
            <label>Date of Birth :</label><br>
            <input type="date">

            <br><br>

            <!-- 6 -->
            <label>Gender :</label><br>

            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other

            <br><br>

            <!-- 7 -->
            <label>Department :</label><br>

            <select>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>MECH</option>
            </select>

            <br><br>

            <!-- 8 -->
            <label>Favorite Color :</label><br>
            <input type="color">

            <br><br>

            <!-- 9 -->
            <label>Upload Profile Photo :</label><br>
            <input type="file">

            <br><br>

            <!-- 10 -->
            <label>College Timing :</label><br>
            <input type="time">

            <br><br>

            <!-- 11 -->
            <label>Website :</label><br>
            <input type="url" placeholder="Enter website link">

            <br><br>

            <!-- 12 -->
            <label>Search Course :</label><br>
            <input type="search" placeholder="Search here">

            <br><br>

            <!-- 13 -->
            <label>Programming Skills :</label><br>

            <input type="checkbox"> Python
            <input type="checkbox"> Java
            <input type="checkbox"> Django
            <input type="checkbox"> HTML

            <br><br>

            <!-- 14 -->
            <label>Address :</label><br>

            <textarea rows="4" cols="30"
            placeholder="Enter address"></textarea>

            <br><br>

            <!-- 15 -->
            <label>Experience Level :</label><br>

            Beginner
            <input type="range">
            Expert

            <br><br>

            <input type="submit" value="Register">

        </form>

  

</body>

</html>
