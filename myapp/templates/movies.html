{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #000000, #1a1a1a);
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
            background-color: #111;
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-bottom: 10px;
            padding: 8px 15px;
            background: #ffcc00;
            color: black;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="header">
        🎬 Tamil Movies
    </div>

    <div class="container">

        <div class="card">
            <img src="{% static 'image/leo.jpg' %}" alt="GOAT">
            <h3>GOAT</h3>
            <a href="#" class="btn">Watch</a>
        </div>

        <div class="card">
            <img src="{% static 'image/leo.jpg' %}" alt="Coolie">
            <h3>Coolie</h3>
            <a href="#" class="btn">Watch</a>
        </div>

        <div class="card">
            <img src="{% static 'image/leo.jpg' %}" alt="Leo">
            <h3>Leo</h3>
            <a href="#" class="btn">Watch</a>
        </div>

    </div>

</body>
</html>
